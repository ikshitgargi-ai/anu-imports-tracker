services:
  # Main Flask backend (Anu Imports Tracker)
  - type: web
    name: anu-imports-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Long timeout for the Daily A SOD sync (1.5M rows can take ~22 min on free tier)
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 1800 --workers 1
    plan: free  # upgrade to starter $7/mo for always-on (no ~50s cold starts) like the NB tracker
    healthCheckPath: /healthz
    # ENV VALUES: copy the CURRENT values from the lcbo-tracker Render service
    # (same SOD account) — EXCEPT DATABASE_URL, which must be a NEW separate
    # Neon database. NEVER point this app at the NB tracker's database.
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false  # NEW separate Neon database — never the NB one
      - key: SOD_USER
        sync: false  # same SOD account as lcbo-tracker — copy current value
      - key: SOD_PASSWORD
        sync: false  # same SOD account as lcbo-tracker — copy current value
      - key: SOD_AGENT_ID
        sync: false  # same SOD account as lcbo-tracker — copy current value
      - key: SOD_CRON_TOKEN
        sync: false  # used by the Cron Job below
      - key: SENTRY_DSN
        sync: false  # optional
      - key: CORS_ORIGINS
        sync: false  # comma-separated; defaults work for anu-imports-web.vercel.app + localhost

  # Daily SOD refresh cron — belt-and-suspenders to in-process APScheduler.
  # Runs at 03:05 ET (05:05 UTC fall, 04:05 UTC summer — Render uses UTC for cron).
  # Curls the protected /api/sod/cron endpoint; if the in-process scheduler already
  # ran (last sync < 6h ago) the endpoint no-ops.
  # NOTE: Render cron jobs are NOT available on the free plan — this stays on
  # starter (cheapest cron tier). If you don't want the cost, delete this block:
  # the in-process APScheduler on the web service covers the daily sync anyway.
  - type: cron
    name: anu-imports-sod-daily-cron
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    schedule: "5 7 * * *"  # 07:05 UTC = 02:05 ET (winter) / 03:05 ET (summer-ish)
    plan: starter
    envVars:
      - key: SOD_CRON_TOKEN
        sync: false  # MUST match the SOD_CRON_TOKEN on the web service
    dockerCommand: >
      curl -fsS -X POST -H "Authorization: Bearer $SOD_CRON_TOKEN"
      https://anu-imports-tracker.onrender.com/api/sod/cron

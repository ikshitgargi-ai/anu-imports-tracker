services:
  # Main Flask backend (Anu Imports Tracker)
  - type: web
    name: anu-imports-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Long timeout for the Daily A SOD sync (1.5M rows can take ~22 min)
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 1800 --workers 1
    plan: starter  # always-on ($7/mo). Founder approved 2026-07-14 so the in-process GTHA sweep drainer runs to completion. Free tier slept the dyno mid-sweep and froze the drainer thread. Confirm the plan change once in the Render dashboard.
    healthCheckPath: /healthz
    # ENV VALUES: copy the CURRENT values from the lcbo-tracker Render service
    # (same SOD account) — EXCEPT DATABASE_URL, which must be a NEW separate
    # Neon database. NEVER point this app at the NB tracker's database.
    # The nightly LCBO SOD sync runs from the app's OWN in-process scheduler
    # (APScheduler) — no separate cron service needed (founder choice 2026-06-20).
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false  # NEW separate Neon database — never the NB one
      - key: SOD_USER
        sync: false  # same SOD account as lcbo-tracker — copy current value
      - key: SOD_PASSWORD
        sync: false  # same SOD account as lcbo-tracker — copy current value
      - key: SOD_AGENT_ID
        sync: false  # same SOD account as lcbo-tracker — copy current value (1113)
      - key: SOD_CRON_TOKEN
        sync: false  # optional now (no external cron) — keep for the protected /api/sod/cron endpoint
      - key: ADMIN_TOKEN
        sync: false  # protects /api/admin/* + the one-tap "Load 148 stores" button
      - key: RESEND_API_KEY
        sync: false  # enables shelf-photo emails to Ikshit + daily backup
      - key: ALERT_EMAIL_TO
        value: "ikshit@anuspirits.com"
      - key: ALERT_EMAIL_FROM
        value: "alerts@anuspirits.com"
      - key: SENTRY_DSN
        sync: false  # optional
      - key: CORS_ORIGINS
        sync: false  # comma-separated; defaults work for anu-imports-web.vercel.app + localhost
